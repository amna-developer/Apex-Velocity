<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
    <link rel="shortcut icon" href="https://img.icons8.com/?size=100&id=KJlaQhbsxSnM&format=png&color=000000" type="image/x-icon">
    <title>Apex Velocity </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
   
</head>
<body class="overflow-hidden select-none h-screen w-screen flex items-center justify-center">

    <div id="gameContainer" class="relative w-full h-full max-w-[480px] max-h-[850px] bg-black shadow-2xl shadow-red-500/20 border border-gray-800 overflow-hidden md:rounded-2xl">
        
        <canvas id="gameCanvas" class="w-full h-full block"></canvas>

        <div id="hud" class="absolute top-4 left-4 right-4 flex justify-between items-center pointer-events-none hidden z-10">
            <div class="bg-black/90 backdrop-blur-md border border-red-500/40 px-3 py-1.5 rounded text-xs tracking-widest">
                DIST: <span id="hudDistance" class="text-red-500 font-bold">0</span>m / <span id="hudTarget">1000</span>m
            </div>
            <div class="bg-black/90 backdrop-blur-md border border-cyan-500/40 px-3 py-1.5 rounded text-xs tracking-widest">
                SPEED: <span id="hudSpeed" class="text-cyan-400 font-bold">0</span> km/h
            </div>
        </div>

        <div id="mobileControls" class="absolute bottom-6 left-4 right-4 flex justify-between pointer-events-none hidden z-30">
            <button type="button" id="leftBtn" class="touch-ctrl pointer-events-auto w-20 h-20 bg-white/10 active:bg-white/30 backdrop-blur-sm border-2 border-white/30 rounded-full flex items-center justify-center font-black text-2xl select-none">←</button>
            <button type="button" id="rightBtn" class="touch-ctrl pointer-events-auto w-20 h-20 bg-white/10 active:bg-white/30 backdrop-blur-sm border-2 border-white/30 rounded-full flex items-center justify-center font-black text-2xl select-none">→</button>
        </div>

        <div id="mainMenu" class="absolute inset-0 bg-gradient-to-b from-gray-950 via-black to-gray-950 flex flex-col justify-between p-6 z-30">
            <div class="text-center mt-4">
                <h1 class="text-3xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-red-500 via-orange-400 to-yellow-400 drop-shadow-md">
                    APEX VELOCITY
                </h1>
                <p class="text-[10px] text-gray-400 tracking-widest mt-1">THE ULTIMATE HTML5 RACING EXPERIENCE</p>
            </div>

            <div class="space-y-5 my-auto">
                <div>
                    <label class="block text-[11px] uppercase tracking-widest text-gray-400 mb-2 text-center">Select Your Supercar</label>
                    <div class="grid grid-cols-2 gap-3" id="carSelector">
                        <button type="button" data-car="ferrari" class="car-btn active border p-3 rounded-xl flex flex-col items-center justify-center transition-all hover:scale-105">
                            <span class="text-xs font-bold tracking-wide">FERRARI SF90</span>
                            <span class="text-[10px] text-red-400 font-bold mt-0.5">Handling: Ultra</span>
                        </button>
                        <button type="button" data-car="bmw" class="car-btn border p-3 rounded-xl flex flex-col items-center justify-center transition-all hover:scale-105">
                            <span class="text-xs font-bold tracking-wide">BMW M4 GTS</span>
                            <span class="text-[10px] text-blue-400 font-bold mt-0.5">Handling: Balanced</span>
                        </button>
                        <button type="button" data-car="porsche" class="car-btn border p-3 rounded-xl flex flex-col items-center justify-center transition-all hover:scale-105">
                            <span class="text-xs font-bold tracking-wide">PORSCHE 911</span>
                            <span class="text-[10px] text-yellow-400 font-bold mt-0.5">Handling: Sharp</span>
                        </button>
                        <button type="button" data-car="f1" class="car-btn border p-3 rounded-xl flex flex-col items-center justify-center transition-all hover:scale-105">
                            <span class="text-xs font-bold tracking-wide">F1 HYBRID</span>
                            <span class="text-[10px] text-green-400 font-bold mt-0.5">Handling: Extreme</span>
                        </button>
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] uppercase tracking-widest text-gray-400 mb-2 text-center">Select Difficulty Mode</label>
                    <div class="grid grid-cols-3 gap-2" id="modeSelector">
                        <button type="button" data-mode="basic" class="mode-btn active border py-2.5 rounded text-xs font-bold transition-all">
                            BASIC
                        </button>
                        <button type="button" data-mode="intermediate" class="mode-btn border py-2.5 rounded text-xs font-bold transition-all">
                            INTER.
                        </button>
                        <button type="button" data-mode="advance" class="mode-btn border py-2.5 rounded text-xs font-bold transition-all">
                            ADVANCE
                        </button>
                    </div>
                </div>
            </div>

            <div class="space-y-3 mb-2">
                <div class="text-center text-[10px] text-gray-400 tracking-wider">
                    DESKTOP: <span class="text-white px-1 bg-gray-800 rounded">A/D</span> OR <span class="text-white px-1 bg-gray-800 rounded">←/→</span> | MOBILE: USE TOUCH BUTTONS
                </div>
                <button type="button" id="startBtn" class="w-full bg-gradient-to-r from-red-600 to-orange-500 hover:from-red-500 hover:to-orange-400 text-white font-extrabold py-4 px-6 rounded-xl tracking-widest shadow-lg shadow-orange-600/30 transform active:scale-95 transition-all text-center">
                    START RACE
                </button>
            </div>
        </div>

        <div id="screenOverlay" class="absolute inset-0 bg-black/95 backdrop-blur-sm flex flex-col items-center justify-center p-6 z-40 hidden">
            <h2 id="overlayTitle" class="text-3xl font-black tracking-widest text-red-500 mb-2">GAME OVER</h2>
            <p id="overlayDesc" class="text-sm text-gray-400 tracking-wider text-center mb-8">You crashed into an obstacle!</p>
            <button type="button" id="restartBtn" class="w-2/3 bg-white text-black font-black py-3 px-6 rounded-lg tracking-widest hover:bg-gray-200 transition-all active:scale-95 text-center">
                TRY AGAIN
            </button>
        </div>
    </div>

    
     <script src="./script.js"></script>
</body>
</html>
